name: Build and Deploy
on:
  pull_request:
    branches: [staging, main]
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: github.event.pull_request.merged == true && github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ github.event.pull_request.base.ref == 'main' && 'production' || 'staging' }}
    env:
      HOST: ${{ secrets.HOST }}
      USERNAME: ${{ secrets.USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Lint code
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
              DEPLOY_DIR="/var/www/frontend-production"
              APP_NAME="frontend-production"
              BRANCH="main"
              PORT=3001
              ENV_FILE="/etc/vulnwatch/production/frontend.env"
            else
              DEPLOY_DIR="/var/www/frontend-staging"
              APP_NAME="frontend-staging"
              BRANCH="staging"
              PORT=3000
              ENV_FILE="/etc/vulnwatch/staging/frontend.env"
            fi

            BACKUP_DIR="${DEPLOY_DIR}-backup"

            # ── Backup current version ────────────────────────────────────
            if [ -d "$DEPLOY_DIR" ] && [ "$(ls -A $DEPLOY_DIR)" ]; then
              echo "Backing up current version..."
              rm -rf "$BACKUP_DIR"
              cp -r "$DEPLOY_DIR" "$BACKUP_DIR"
            else
              echo "No existing deployment found. Fresh deploy, no backup created."
            fi

            # ── Pull latest code ──────────────────────────────────────────
            echo "Pulling latest code from $BRANCH..."
            cd "$DEPLOY_DIR"
            git reset --hard HEAD
            git pull origin "$BRANCH"

            # ── Re-link persistent env file before building ───────────────
            if [ -f "$ENV_FILE" ]; then
              echo "Linking .env.local from $ENV_FILE..."
              ln -sf "$ENV_FILE" "$DEPLOY_DIR/.env.local"
            else
              echo "WARNING: $ENV_FILE not found. Build may not have correct env vars."
            fi

            # ── Install dependencies and build ────────────────────────────
            echo "Installing dependencies..."
            pnpm install

            echo "Building application..."
            if ! pnpm build; then
              echo "Build failed. Rolling back..."

              if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR)" ]; then
                pm2 delete $APP_NAME || true
                pm2 flush $APP_NAME || true
                rm -rf "$DEPLOY_DIR"
                cp -r "$BACKUP_DIR" "$DEPLOY_DIR"
                cd "$DEPLOY_DIR"
                pm2 start "pnpm start --port $PORT" --name "$APP_NAME" --cwd "$DEPLOY_DIR"
                pm2 save
                rm -rf "$BACKUP_DIR"
                echo "Rollback successful. Site is running on previous version."
              else
                echo "No backup available. This was a fresh deploy — site is down."
              fi

              exit 1
            fi

            # ── Stop old PM2 process ──────────────────────────────────────
            pm2 delete $APP_NAME || true
            pm2 flush $APP_NAME || true

            # ── Start app with PM2 ────────────────────────────────────────
            echo "Starting $APP_NAME with PM2..."
            pm2 start "pnpm start --port $PORT" --name "$APP_NAME" --cwd "$DEPLOY_DIR"
            pm2 save

            # ── Health check ──────────────────────────────────────────────
            echo "Running health check..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT)
              if [ "$STATUS" = "200" ]; then
                HEALTHY=true
                echo "Health check passed on attempt $i (HTTP $STATUS)"
                break
              else
                echo "Attempt $i: HTTP $STATUS, retrying..."
              fi
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "Health check failed. Rolling back..."

              pm2 delete $APP_NAME || true

              if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR)" ]; then
                rm -rf "$DEPLOY_DIR"
                cp -r "$BACKUP_DIR" "$DEPLOY_DIR"
                cd "$DEPLOY_DIR"

                # Re-link env after rollback
                if [ -f "$ENV_FILE" ]; then
                  ln -sf "$ENV_FILE" "$DEPLOY_DIR/.env.local"
                fi

                pm2 start "pnpm start --port $PORT" --name "$APP_NAME" --cwd "$DEPLOY_DIR"
                pm2 save
                rm -rf "$BACKUP_DIR"
                echo "Rollback successful. Site is running on previous version."
              else
                echo "No backup available. This was a fresh deploy — site is down."
              fi

              exit 1
            fi

            # ── Cleanup backup after successful deploy ────────────────────
            if [ -d "$BACKUP_DIR" ]; then
              echo "Deploy successful. Cleaning up backup..."
              rm -rf "$BACKUP_DIR"
            fi

            echo "Deploy successful!"
            pm2 save
            pm2 list
