name: Build and Deploy
on:
  pull_request:
    branches: [staging, main]
    types: [closed]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    if: github.event.pull_request.merged == true && github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ github.event.pull_request.base.ref == 'main' && 'production' || 'staging' }}
    env:
      HOST: ${{ secrets.HOST }}
      USERNAME: ${{ secrets.USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install
      - name: Lint code
        run: pnpm lint
      - name: Type check
        run: pnpm typecheck
      - name: Set environment variables for build
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
            echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" >> .env.local
            echo "NEXT_PUBLIC_APP_URL=https://vuln-watch.hng14.com" >> .env.local
            echo "API_BASE_URL=https://api.vuln-watch.hng14.com" >> .env.local
          else
            echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" >> .env.local
            echo "NEXT_PUBLIC_APP_URL=https://staging.vuln-watch.hng14.com" >> .env.local
            echo "API_BASE_URL=https://api.staging.vuln-watch.hng14.com" >> .env.local
          fi

      - name: Force Next standalone output for CI deploy
        run: |
          if [ -f next.config.mjs ]; then
            mv next.config.mjs next.config.base.mjs
            cat > next.config.mjs <<'EOF'
          import baseConfig from "./next.config.base.mjs";

          const withStandalone = (cfg) =>
            typeof cfg === "function"
              ? (...args) => ({ ...(cfg(...args) || {}), output: "standalone" })
              : { ...(cfg || {}), output: "standalone" };

          export default withStandalone(baseConfig);
          EOF

          elif [ -f next.config.js ]; then
            mv next.config.js next.config.base.js
            cat > next.config.js <<'EOF'
          const baseConfig = require("./next.config.base.js");

          const withStandalone = (cfg) =>
            typeof cfg === "function"
              ? (...args) => ({ ...(cfg(...args) || {}), output: "standalone" })
              : { ...(cfg || {}), output: "standalone" };

          module.exports = withStandalone(baseConfig);
          EOF

          elif [ -f next.config.ts ]; then
            mv next.config.ts next.config.base.ts
            cat > next.config.ts <<'EOF'
          import type { NextConfig } from "next";
          import baseConfig from "./next.config.base";

          const withStandalone = (cfg: any): NextConfig | ((...args: any[]) => NextConfig) =>
            typeof cfg === "function"
              ? (...args: any[]) => ({ ...(cfg(...args) || {}), output: "standalone" })
              : { ...(cfg || {}), output: "standalone" };

          export default withStandalone(baseConfig as any) as any;
          EOF

          else
            cat > next.config.js <<'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: 'standalone',
          };
          module.exports = nextConfig;
          EOF
          fi

      - name: Build Next.js application
        run: pnpm build

      - name: Prepare standalone build
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js || (echo "Missing .next/standalone/server.js"; exit 1)

      - name: Package standalone build
        run: tar -czf standalone.tar.gz -C .next/standalone .

      - name: Copy tarball to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "standalone.tar.gz"
          target: "/tmp"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
              DEPLOY_DIR="/var/www/frontend-production"
              APP_NAME="frontend-production"
              PORT=3001
            else
              DEPLOY_DIR="/var/www/frontend-staging"
              APP_NAME="frontend-staging"
              PORT=3000
            fi

            BACKUP_DIR="${DEPLOY_DIR}-backup"

            # Backup current version if it exists
            if [ -d "$DEPLOY_DIR" ] && [ "$(ls -A $DEPLOY_DIR)" ]; then
              echo "Backing up current version..."
              rm -rf "$BACKUP_DIR"
              cp -r "$DEPLOY_DIR" "$BACKUP_DIR"
            else
              echo "No existing deployment found. Fresh deploy, no backup created."
            fi

            # Stop and delete existing PM2 process
            pm2 delete $APP_NAME || true

            # Wipe and recreate deploy directory
            rm -rf "$DEPLOY_DIR"
            mkdir -p "$DEPLOY_DIR"

            # Extract tarball
            tar -xzf /tmp/standalone.tar.gz -C "$DEPLOY_DIR"
            rm -f /tmp/standalone.tar.gz

            # Verify server.js exists after extraction
            if [ ! -f "$DEPLOY_DIR/server.js" ]; then
              echo "ERROR: server.js not found in $DEPLOY_DIR after extraction"
              exit 1
            fi

            # Start app with PM2
            cd "$DEPLOY_DIR"
            PORT=$PORT pm2 start server.js --name "$APP_NAME"
            pm2 save

            # Health check — retry 5 times, 3 seconds apart
            echo "Running health check..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT)
              if [ "$STATUS" = "200" ]; then
                HEALTHY=true
                echo "Health check passed on attempt $i (HTTP $STATUS)"
                break
              else
                echo "Attempt $i: HTTP $STATUS, retrying..."
              fi
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "Health check failed after 5 attempts."

              # Rollback if backup exists
              if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR)" ]; then
                echo "Rolling back to previous version..."
                pm2 delete $APP_NAME || true
                rm -rf "$DEPLOY_DIR"
                cp -r "$BACKUP_DIR" "$DEPLOY_DIR"
                cd "$DEPLOY_DIR"
                PORT=$PORT pm2 start server.js --name "$APP_NAME"
                pm2 save
                echo "Rollback successful. Site is running on previous version."
              else
                echo "No backup available. This was a fresh deploy — site is down."
              fi

              exit 1
            fi

            # Cleanup backup after successful deploy
            if [ -d "$BACKUP_DIR" ]; then
              echo "Deploy successful. Cleaning up backup..."
              rm -rf "$BACKUP_DIR"
            fi

            pm2 list
